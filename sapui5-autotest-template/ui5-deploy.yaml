specVersion: "3.0"
metadata:
  name: demo.autotest
type: application
server:
  customMiddleware:
    - name: sap-fe-mockserver
      mountPath: /
      afterMiddleware: compression
      configuration:
        services:
          - urlPath: /sap/opu/odata/sap/ZUI5_AUTOTEST_SRV
            metadataPath: ./webapp/localService/metadata.xml
            mockdataPath: ./webapp/localService/mockdata
framework:
  name: OpenUI5
  version: "1.120.22"
  libraries:
    - name: sap.m
    - name: sap.ui.core
builder:
  customTasks:
    - name: ui5-task-nwabap-deployer
      afterTask: generateVersionInfo
      configuration:
        resources:
          pattern: "**/*.*"
        connection:
          server: https://www.new-tec.cn:50001
          client: "001"
          useStrictSSL: false
        ui5:
          language: EN
          package: $TMP
          bspContainer: ZUI5_AUTOTEST
          bspContainerText: UI5 Auto Test Template
          calculateApplicationIndex: true
