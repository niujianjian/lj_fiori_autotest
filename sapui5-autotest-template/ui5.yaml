specVersion: "3.0"
metadata:
  name: demo.autotest
type: application
server:
  customMiddleware:
    - name: sap-fe-mockserver
      mountPath: /
      afterMiddleware: compression
      configuration:
        services:
          - urlPath: /sap/opu/odata/sap/ZUI5_AUTOTEST_SRV
            metadataPath: ./webapp/localService/metadata.xml
            mockdataPath: ./webapp/localService/mockdata
framework:
  name: OpenUI5
  version: "1.120.22"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: themelib_sap_horizon