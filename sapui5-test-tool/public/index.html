<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAPUI5 Test Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Standalone Workspace Tool</p>
          <h1>SAPUI5 Test Tool</h1>
          <p class="subtitle">在浏览器里启动本地 UI5 服务、运行 unit / OPA / e2e，并查看最近执行日志。</p>
        </div>
        <div class="hero-card">
          <span id="tool-port">Port 8095</span>
          <strong id="selected-project-name">未选择项目</strong>
          <small id="selected-project-path">请选择一个可运行的 SAPUI5 项目</small>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-projects">
          <div class="panel-header">
            <h2>Project</h2>
            <button id="refresh-projects" class="ghost-button">Refresh</button>
          </div>
          <label class="field-label" for="project-select">Target Project</label>
          <select id="project-select"></select>
          <p id="project-description" class="muted"></p>

          <div class="actions-grid compact-grid">
            <button data-action="server-start" class="primary-button">Start Server</button>
            <button data-action="server-stop" class="ghost-button">Stop Server</button>
            <button data-action="task-stop" class="ghost-button warn">Stop Task</button>
          </div>

          <div class="status-strip">
            <div>
              <span>Server</span>
              <strong id="server-status">idle</strong>
            </div>
            <div>
              <span>Task</span>
              <strong id="task-status">idle</strong>
            </div>
          </div>
        </section>

        <section class="panel panel-actions">
          <div class="panel-header">
            <h2>Test Actions</h2>
            <span class="muted">自动识别 `package.json` 里的脚本</span>
          </div>
          <div id="script-buttons" class="actions-grid"></div>
        </section>

        <section class="panel panel-history">
          <div class="panel-header">
            <h2>Recent Tasks</h2>
          </div>
          <div id="recent-tasks" class="task-list"></div>
        </section>

        <section class="panel panel-logs">
          <div class="panel-header">
            <h2>Live Logs</h2>
            <button id="clear-log-view" class="ghost-button">Scroll Bottom</button>
          </div>
          <pre id="log-view"></pre>
        </section>
      </main>
    </div>

    <template id="task-template">
      <article class="task-card">
        <div class="task-line">
          <strong class="task-script"></strong>
          <span class="task-kind"></span>
        </div>
        <div class="task-line muted">
          <span class="task-status"></span>
          <span class="task-time"></span>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
  </html>
